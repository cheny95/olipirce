type: vertical-stack
cards:
  - type: markdown
    title: 油价看板
    content: >-
      <ha-alert alert-type="info">更新时间：{{ states('sensor.you_jie_bei_jing_update_time') or '暂无' }}</ha-alert>

      <table style="width:100%;border-collapse:collapse;text-align:center;font-size:16px;">
        <tr>
          <th style="padding:8px;border-bottom:1px solid #ddd;">油品</th>
          <th style="padding:8px;border-bottom:1px solid #ddd;">价格 (元/L)</th>
        </tr>
        <tr>
          <td style="padding:8px;">92# 汽油</td>
          <td style="padding:8px;color:#e53935;"><b>{{ states('sensor.you_jie_bei_jing_gas92') or '-' }}</b></td>
        </tr>
        <tr style="background:rgba(0,0,0,0.03);">
          <td style="padding:8px;">95# 汽油</td>
          <td style="padding:8px;color:#f9a825;"><b>{{ states('sensor.you_jie_bei_jing_gas95') or '-' }}</b></td>
        </tr>
        <tr>
          <td style="padding:8px;">98# 汽油</td>
          <td style="padding:8px;color:#1e88e5;"><b>{{ states('sensor.you_jie_bei_jing_gas98') or '-' }}</b></td>
        </tr>
        <tr style="background:rgba(0,0,0,0.03);">
          <td style="padding:8px;">0# 柴油</td>
          <td style="padding:8px;color:#43a047;"><b>{{ states('sensor.you_jie_bei_jing_die0') or '-' }}</b></td>
        </tr>
      </table>

  - type: entities
    title: 调价信息
    entities:
      - entity: sensor.you_jie_bei_jing_time
        name: 下次调价
      - entity: sensor.you_jie_bei_jing_tips
        name: 趋势提示

  - type: button
    entity: button.you_jie_bei_jing_refresh
    name: 立即更新油价
    icon: mdi:refresh
    show_state: false
    tap_action:
      action: call-service
      service: button.press
      service_data:
        entity_id: button.you_jie_bei_jing_refresh

